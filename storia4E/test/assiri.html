<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Quiz sugli Assiri</title>

<style>
body{
font-family: Arial;
background:#d0e6f5;
text-align:center;
}

.quiz{
background:white;
width:500px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.progress{
width:100%;
background:#ddd;
height:20px;
border-radius:10px;
margin-bottom:20px;
}

.progress-bar{
height:20px;
width:0%;
background:#1e90ff;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Quiz sugli Antichi Assiri</h1>

<div class="quiz">

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div id="quiz"></div>

<button onclick="next()">Avanti</button>

</div>

<script>

let domanda = 0
let punti = 0
let fase = "domanda"

const domande = [

{
q:"Da dove provenivano?",
a:["In Mesopotamia","Da un territorio poco fertile e montuoso","In Grecia"],
c:2
},

{
q:"Chi erano?",
a:["Pastori e mercanti","Scribi","Schiavi"],
c:0
},

{
q:"Cosa c'era nella biblioteca di Ninive?",
a:["Libri normali","Tavolette di argilla","Penne da comprare"],
c:1
},

{
q:"Chi era il più importante?",
a:["Assurbanipal","Tutankhamon","Re Narmer"],
c:0
},

{
q:"Dove vivevano i contadini?",
a:["in case di paglia","Nelle catapecchie","In case di mattoni"],
c:2
}

]

function mostra(){

let q = domande[domanda]

let html = "<h2>"+q.q+"</h2>"

for(let i=0;i<q.a.length;i++){
html += `
<label>
<input type="radio" name="r" value="${i}">
${q.a[i]}
</label><br>
`
}

document.getElementById("quiz").innerHTML = html

let progresso = (domanda/domande.length)*100
document.getElementById("bar").style.width = progresso+"%"
}

function next(){

if(fase === "risposta"){

domanda++

if(domanda >= domande.length){
fine()
}else{
fase = "domanda"
mostra()
}

return
}

let scelta = document.querySelector("input[name=r]:checked")

if(!scelta) return

let sceltaUtente = Number(scelta.value)
let corretta = domande[domanda].c
let q = domande[domanda]

if(sceltaUtente === corretta){

punti++

document.getElementById("quiz").innerHTML = `
<h2>✅ Corretto!</h2>
<p>La risposta era: <b>${q.a[corretta]}</b></p>
`

}else{

document.getElementById("quiz").innerHTML = `
<h2>❌ Sbagliato!</h2>
<p>La risposta giusta era:</p>
<b>${q.a[corretta]}</b>
`

}

fase = "risposta"

}

function fine(){

document.getElementById("bar").style.width = "100%"

let testo = ""

if(punti == 5){
testo = "10 e lode!"
}
else if(punti == 4){
testo = "Sei molto bravo!"
}
else if(punti == 3){
testo = "Sei bravo!"
}
else if(punti == 2){
testo = "Potresti migliorare"
}
else if(punti == 1){
testo = "Ripassa"
}
else{
testo = "Non lo sai"
}

document.getElementById("quiz").innerHTML = `
<h2>Quiz finito!</h2>
<p>Hai fatto ${punti} punti su ${domande.length}</p>
<h3>${testo}</h3>
`

}

mostra()

</script>

</body>
</html>
